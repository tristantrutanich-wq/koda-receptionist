<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koda Receptionist - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .stat-card.total { border-top: 4px solid #667eea; }
        .stat-card.qualified { border-top: 4px solid #10b981; }
        .stat-card.hangups { border-top: 4px solid #ef4444; }
        .stat-card.short { border-top: 4px solid #f59e0b; }
        .stat-card.completed { border-top: 4px solid #6b7280; }
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-card.total .stat-number { color: #667eea; }
        .stat-card.qualified .stat-number { color: #10b981; }
        .stat-card.hangups .stat-number { color: #ef4444; }
        .stat-card.short .stat-number { color: #f59e0b; }
        .stat-card.completed .stat-number { color: #6b7280; }
        .stat-label {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .section h2 {
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .call-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .call-item {
            border-left: 4px solid;
            padding: 15px;
            background: #f9fafb;
            border-radius: 0 8px 8px 0;
            transition: transform 0.2s;
        }
        .call-item:hover {
            transform: translateX(5px);
        }
        .call-item.hot { border-left-color: #ef4444; background: #fef2f2; }
        .call-item.booked { border-left-color: #10b981; background: #ecfdf5; }
        .call-item.lead { border-left-color: #3b82f6; background: #eff6ff; }
        .call-item.completed { border-left-color: #6b7280; }
        .call-item.short { border-left-color: #f59e0b; background: #fffbeb; }
        .call-item.hangup { border-left-color: #9ca3af; background: #f3f4f6; }
        .call-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .call-type {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8em;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .call-type.hot { background: #ef4444; color: white; }
        .call-type.booked { background: #10b981; color: white; }
        .call-type.lead { background: #3b82f6; color: white; }
        .call-type.completed { background: #6b7280; color: white; }
        .call-type.short { background: #f59e0b; color: white; }
        .call-type.hangup { background: #9ca3af; color: white; }
        .call-time {
            color: #666;
            font-size: 0.9em;
        }
        .call-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 10px;
        }
        .call-detail {
            font-size: 0.9em;
        }
        .call-detail strong {
            color: #333;
        }
        .call-transcript {
            background: white;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85em;
            color: #666;
            max-height: 100px;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-top: 10px;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .empty-state h3 {
            margin-bottom: 10px;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #10b981;
            color: white;
            border-radius: 20px;
            font-weight: bold;
        }
        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .phone-number {
            font-size: 1.5em;
            color: #667eea;
            font-weight: bold;
            margin-top: 10px;
        }
        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Koda Receptionist</h1>
            <p>AI-powered phone answering for small businesses</p>
            <div class="status-badge">AI STATUS: LIVE</div>
            <div class="phone-number">(424) 340-0902</div>
        </div>

        <div class="stats-grid" id="stats">
            <div class="stat-card total">
                <div class="stat-number" id="total-calls">0</div>
                <div class="stat-label">Total Calls</div>
            </div>
            <div class="stat-card qualified">
                <div class="stat-number" id="qualified-calls">0</div>
                <div class="stat-label">Qualified Leads</div>
            </div>
            <div class="stat-card hangups">
                <div class="stat-number" id="hangup-calls">0</div>
                <div class="stat-label">Hang-ups</div>
            </div>
            <div class="stat-card short">
                <div class="stat-number" id="short-calls">0</div>
                <div class="stat-label">Short Calls</div>
            </div>
            <div class="stat-card completed">
                <div class="stat-number" id="completed-calls">0</div>
                <div class="stat-label">Completed</div>
            </div>
        </div>

        <div class="section">
            <h2>📞 All Calls</h2>
            <div class="call-list" id="call-list">
                <div class="empty-state">
                    <h3>No calls yet</h3>
                    <p>When someone calls your number, they'll appear here.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString();
        }

        function formatDuration(seconds) {
            if (!seconds) return 'N/A';
            if (seconds < 60) return `${seconds}s`;
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}m ${secs}s`;
        }

        function getTypeLabel(type) {
            const labels = {
                'hot': '🔥 Hot Lead',
                'booked': '📅 Meeting Booked',
                'lead': '📞 Lead',
                'completed': '✓ Completed',
                'short': '⚡ Short Call',
                'hangup': '✕ Hang-up'
            };
            return labels[type] || type;
        }

        async function loadCalls() {
            try {
                const response = await fetch('/calls-data');
                const data = await response.json();
                
                // Update stats
                document.getElementById('total-calls').textContent = data.stats.total;
                document.getElementById('qualified-calls').textContent = data.stats.qualified;
                document.getElementById('hangup-calls').textContent = data.stats.hangups;
                document.getElementById('short-calls').textContent = data.stats.short;
                document.getElementById('completed-calls').textContent = data.stats.completed;
                
                // Update call list
                const callList = document.getElementById('call-list');
                
                if (data.calls.length === 0) {
                    callList.innerHTML = `
                        <div class="empty-state">
                            <h3>No calls yet</h3>
                            <p>When someone calls your number, they'll appear here.</p>
                        </div>
                    `;
                    return;
                }
                
                callList.innerHTML = data.calls.map(call => `
                    <div class="call-item ${call.type}">
                        <div class="call-header">
                            <span class="call-type ${call.type}">${getTypeLabel(call.type)}</span>
                            <span class="call-time">${formatTime(call.timestamp)}</span>
                        </div>
                        <div class="call-details">
                            <div class="call-detail"><strong>From:</strong> ${call.customer}</div>
                            <div class="call-detail"><strong>Duration:</strong> ${formatDuration(call.duration)}</div>
                        </div>
                        ${call.transcript ? `<div class="call-transcript">${call.transcript.substring(0, 300)}${call.transcript.length > 300 ? '...' : ''}</div>` : ''}
                    </div>
                `).join('');
                
            } catch (err) {
                console.error('Failed to load calls:', err);
                document.getElementById('call-list').innerHTML = `
                    <div class="empty-state">
                        <h3>Error loading calls</h3>
                        <p>Please refresh the page to try again.</p>
                    </div>
                `;
            }
        }

        // Load on page load
        loadCalls();
        
        // Refresh every 30 seconds
        setInterval(loadCalls, 30000);
    </script>
</body>
</html>
